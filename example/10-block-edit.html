<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DumbyMap – Block Editing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../dist/css/dumbymap.css">
  <style>
    /* ── Edit modal ── */
    #edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #edit-overlay.open { display: flex; }

    #edit-modal {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      width: 640px;
      max-width: 92vw;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.22);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #edit-modal header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #edit-modal header span:first-child {
      font-weight: 600;
      font-size: 15px;
      font-family: system-ui, sans-serif;
    }
    #edit-modal .hint {
      font-size: 12px;
      color: #888;
      font-family: system-ui, sans-serif;
    }

    #edit-textarea {
      width: 100%;
      min-height: 200px;
      font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }
    #edit-textarea:focus {
      border-color: #4f80f5;
      box-shadow: 0 0 0 3px rgba(79, 128, 245, 0.15);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
    }
    #btn-save   { background: #2563eb; color: #fff; font-weight: 600; }
    #btn-cancel { background: #e5e7eb; color: #333; }
    #btn-save:hover   { opacity: 0.88; }
    #btn-cancel:hover { opacity: 0.88; }
  </style>
</head>
<body>

<div id="app"></div>

<!-- Edit modal -->
<div id="edit-overlay">
  <div id="edit-modal">
    <header>
      <span>Edit Block</span>
      <span class="hint">Ctrl+Enter to save &nbsp;·&nbsp; Esc to cancel</span>
    </header>
    <textarea id="edit-textarea" spellcheck="false"></textarea>
    <div class="modal-actions">
      <button id="btn-cancel">Cancel</button>
      <button id="btn-save">Save</button>
    </div>
  </div>
</div>

<script type="text/markdown" id="md-source">
# Block Editing

Right-click any content block to edit its Markdown source.
After saving, the block is re-rendered in place — maps are preserved from cache.


## GeoLink

Plain-text coordinates are detected automatically:
Taipei 121.5645,25.0338


## Map

```map
use: Maplibre
center: [121.5645, 25.0338]
zoom: 11
```


## How it works

1. Each `.dumby-block` carries a `data-block-index` attribute.
2. Right-click opens the context menu with an **Edit Block** item.
3. The textarea is pre-filled with the raw Markdown for that block.
4. On save, `markdown2HTML()` is called again — the MutationObservers
   wired up by `generateMaps()` re-process links and re-render maps.
5. Maps with unchanged IDs are restored from cache instantly.
</script>

<script type="module">
  import { markdown2HTML, generateMaps } from '../dist/dumbymap.mjs'

  // ── Block management ────────────────────────────────────────────────────

  /**
   * Split markdown into blocks at 2+ consecutive blank lines,
   * keeping content inside code fences together.
   * This matches DumbyMap's internal block splitting logic.
   *
   * @param {string} md
   * @returns {string[]}
   */
  function splitMd (md) {
    const lines = md.split('\n')
    const blocks = []
    let buf = []
    let inFence = false
    let blanks = 0

    for (const line of lines) {
      if (/^```/.test(line)) inFence = !inFence

      if (!inFence && line.trim() === '') {
        blanks++
        buf.push(line)
      } else {
        if (!inFence && blanks >= 2) {
          const content = buf.slice(0, buf.length - blanks).join('\n').trim()
          if (content) blocks.push(content)
          buf = []
        }
        blanks = 0
        buf.push(line)
      }
    }
    if (buf.length > 0) {
      const content = buf.join('\n').trim()
      if (content) blocks.push(content)
    }
    return blocks
  }

  /** Two blank lines between blocks — matches DumbyMap's block separator */
  const SEP = '\n\n\n'

  let mdBlocks = splitMd(
    document.getElementById('md-source').textContent.trim()
  )

  // ── Rendering ───────────────────────────────────────────────────────────

  const container = document.getElementById('app')

  function assignBlockIndices () {
    container.querySelectorAll('.dumby-block').forEach((block, i) => {
      block.dataset.blockIndex = i
    })
  }

  function render (md) {
    markdown2HTML(container, md)
    assignBlockIndices()
  }

  render(mdBlocks.join(SEP))
  const dumbymap = generateMaps(container)

  // ── Context menu ────────────────────────────────────────────────────────

  dumbymap.utils.setContextMenu((e, menu) => {
    const block = e.target.closest('.dumby-block[data-block-index]')
    if (!block) return

    const item = document.createElement('div')
    item.className = 'menu-item'
    item.textContent = '✏ Edit Block'
    item.onclick = () => openModal(+block.dataset.blockIndex)
    menu.insertBefore(item, menu.firstChild)
  })

  // ── Modal ────────────────────────────────────────────────────────────────

  const overlay = document.getElementById('edit-overlay')
  const textarea = document.getElementById('edit-textarea')
  let editingIndex = null

  function openModal (index) {
    editingIndex = index
    textarea.value = mdBlocks[index]
    overlay.classList.add('open')
    textarea.focus()
    textarea.selectionStart = textarea.selectionEnd = textarea.value.length
  }

  function closeModal () {
    overlay.classList.remove('open')
    editingIndex = null
  }

  function saveModal () {
    if (editingIndex === null) return
    // Textarea content may itself contain multiple blocks
    const replacement = splitMd(textarea.value)
    mdBlocks.splice(editingIndex, 1, ...replacement)
    render(mdBlocks.join(SEP))
    closeModal()
  }

  document.getElementById('btn-save').onclick = saveModal
  document.getElementById('btn-cancel').onclick = closeModal

  // Close on backdrop click
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal()
  })

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal()
  })
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveModal()
  })
</script>

</body>
</html>
