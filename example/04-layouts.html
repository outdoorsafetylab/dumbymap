# Layout System

DumbyMap ships with four layouts that control how content and maps are arranged.
Switch between them via the **right-click context menu** or press **X**.


## normal (default)

Content and the map showcase are placed side by side using standard flow.
The showcase scrolls with the page.


## side-by-side

A **draggable splitter bar** separates the content pane from the map showcase.
Drag it left or right to resize the two panes (constrained to 25 %–75 %).


## overlay

Maps are fixed in the viewport.
Content blocks become **draggable windows** that float on top of the maps.

Each floating block has:
- A close button (or middle-click the block title)
- Font size **+** / **−** buttons
- Snap-to-grid positioning (20 px grid)
- Auto z-index elevation on hover


## sticky

The map showcase becomes a **draggable floating panel** anchored near the bottom-right corner.
Content scrolls normally underneath it.


## Keyboard shortcuts

| Key | Action |
|-----|--------|
| X | Cycle to the next layout |
| Tab | Focus next map |
| N | Focus next content block |
| P | Focus previous content block |
