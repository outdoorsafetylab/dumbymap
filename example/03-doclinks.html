# DocLinks

DocLinks connect anchors to other elements in the document using CSS selectors.
When you hover a DocLink a **leader line** is drawn to the target element.


## Syntax

Write a link whose `href` begins with `#` and whose `title` begins with `=>`:

```markdown
[link text](href="#selector" "=> .target-selector")
```

The first selector (in `href`) is the link destination for navigation;
the second selector (in `title`) identifies the element to draw the leader line to.


## Example

The paragraph below links to the map block.
Hover over it to see the leader line.

[Go to the map below](#map-section "=> #map-section")

See also [the intro heading](#doclinks "=> h1")


## Leader line path styles

Right-click a DocLink to choose a path style:

| Style | Description |
|-------|-------------|
| `magnet` | Default; curved magnetic path |
| `straight` | Direct straight line |
| `grid` | Axis-aligned grid path |
| `fluid` | Smooth fluid curve |

<div id="map-section"></div>

## Map

```map
use: Maplibre
center: [121.5645, 25.0338]
zoom: 12
```
